<!doctype html>
<html lang="ko">
  <head>
    <title>bootstrap 5</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div id="sunghoon">
      <div class="container mt-3">
        <div class="card card-body shadow p-4">
          <div :style="cardStyle">현재 테마가 적용된 카드입니다.</div>
          <div class="d-flex gap-2 mt-3">
            <button @click="changeToDark" class="btn btn-dark">
              다크 테마
            </button>
            <button @click="changeToLight" class="btn btn-light border">
              라이트 테마
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let app = Vue.createApp({
        name: 'App',
        data() {
          return {
            cardStyle: {
              width: '300px',
              padding: '20px',
              border: '1px solid #333',
              borderRadius: '10px', // border-radius
              backgroundColor: '#ffffff', // 배경색
              color: '#000000', // 글자색
            }, //card-style
          }; //return
        }, //data-method
        methods: {
          changeToDark() {
            this.cardStyle.backgroundColor = '#222222';
            this.cardStyle.color = '#ffffff';
          },
          changeToLight() {
            this.cardStyle.backgroundColor = '#ffffff';
            this.cardStyle.color = '#222222';
          },
        },
      });
      app.mount('#sunghoon');
    </script>
  </body>
</html>
