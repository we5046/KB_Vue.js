<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>bootstrap 5</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <div id="sunghoon" class="m-3">
      <div
        class="mt-4 p-5 bg-primary text-black"
        style="
          background-image: url(./background.jpg);
          background-size: cover;
          background-position: center;
          height: 250px;
        "
      >
        <h1>Fullstack Study</h1>
        <p>Vue + 자바 기반의 풀스택 기술을 배웁니다.</p>
      </div>
      <nav class="navbar navbar-expand-sm bg-primary navbar-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#"><i class="fa-solid fa-house"></i> FullStack</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#collapsibleNavbar"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="#">메뉴1 </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">메뉴2 </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">메뉴3 </a>
              </li>
            </ul>
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="#"> <i class="fa-solid fa-user"></i> admin </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">
                  <i class="fa-solid fa-right-from-bracket"></i> 로그아웃
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <br /><br />
      <h1><i class="fa-solid fa-list"></i> 글 목록</h1>
      <table class="table">
        <thead>
          <tr>
            <th>No</th>
            <th>제목</th>
            <th>작성자</th>
            <th>등록일</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="(item, idx) in items">
            <td>{{idx +1}}</td>
            <td><a href="#" class="text-decoration-none">{{item.title}}</a></td>
            <td>{{item.user}}</td>
            <td>{{item.date}}</td>
          </tr>
        </tbody>
      </table>
      <div class="d-flex justify-content-between align-items-center mt-4">
        <ul class="pagination mb-0">
            <li class="page-item"><a class="page-link" href="#"><i class="fa-solid fa-backward-step"></i></a></li>
            <li class="page-item"><a class="page-link" href="#"><i class="fa-solid fa-angle-left"></i></a></li>
            <li class="page-item"><a class="page-link" href="#">6</i></a></li>
            <li class="page-item"><a class="page-link" href="#">7</i></a></li>
            <li class="page-item"><a class="page-link" href="#">8</i></a></li>
            <li class="page-item active"><a class="page-link" href="#">9</i></a></li>
            <li class="page-item"><a class="page-link" href="#">10</i></a></li>
            <li class="page-item"><a class="page-link" href="#"><i class="fa-solid fa-angle-right"></i></a></li>
            <li class="page-item"><a class="page-link" href="#"><i class="fa-solid fa-forward-step"></i></a></li>
        </ul>
        <button type="button" class="btn btn-primary">
            <i class="fa-solid fa-pen-to-square"></i> 글쓰기
        </button>
      </div>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let app = Vue.createApp({
        name: 'App',
        data() {
          return {
            items: [
              { title: '글 제목 1', user: 'user01', date: '2026-03-20' },
              { title: '글 제목 2', user: 'user01', date: '2026-03-20' },
              { title: '글 제목 3', user: 'user01', date: '2026-03-20' },
              { title: '글 제목 4', user: 'user01', date: '2026-03-20' },
              { title: '글 제목 5', user: 'user01', date: '2026-03-20' },
            ],
          };
        },
      });
      app.mount('#sunghoon');
    </script>
  </body>
</html>
