<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>bootstrap 5</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <div id="sunghoon" class="container mt-3">
      <div class="card shadow mt-3">
        <div class="card-body">
          <h3 class="fw-bold mb-4"><i class="fa-regular fa-pen-to-square"></i> 새 글쓰기</h3>
          <form>
            <div class="mb-3">
              <label for="title">제목</label>
              <input v-model="postData.title" id="title" type="text" class="form-control" />
              <div v-if="submitted && postData.title === ''" class="text-danger">
                제목을 입력하세요
              </div>
            </div>
            <div class="mb-3">
              <label for="user">작성자</label>
              <input v-model="postData.writer" id="user" type="text" class="form-control" />
              <div v-if="submitted && postData.writer === ''" class="text-danger">
                작성자를 입력하세요
              </div>
            </div>
            <div class="mb-3">
              <label for="userText">내용</label>
              <textarea
                v-model="postData.content"
                id="userText"
                class="form-control"
                rows="5"
              ></textarea>
              <div v-if="submitted && postData.content === ''" class="text-danger">
                내용을 입력하세요
              </div>
            </div>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-primary" @click="submitForm">
                <i class="fa-solid fa-check"></i> 확인
              </button>
              <button type="button" class="btn btn-primary" @click="resetForm">
                <i class="fa-solid fa-rotate-right fa-flip-horizontal"></i> 취소
              </button>
              <button type="button" class="btn btn-primary" @click="onoffList">
                <i class="fa-solid fa-list"></i> 목록
              </button>
            </div>
          </form>
        </div>
      </div>

      <div v-if="showList" class="card shadow mt-3">
        <div class="card-body">
          <h4 class="fw-bold mb-3"><i class="fa-solid fa-list"></i> 글 목록</h4>

          <div v-if="posts.length === 0" class="text-muted">등록된 글이 없습니다.</div>

          <div v-for="(post, index) in posts" :key="index" class="card mb-2">
            <div class="card-body">
              <h5 class="fw-bold">{{ post.title }}</h5>
              <p class="mb-1">작성자: {{ post.writer }}</p>
              <p class="text-muted">내용: {{ post.content }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let app = Vue.createApp({
        name: 'App',
        data() {
          return {
            submitted: false,
            showList: false,
            posts: [],
            postData: {
              title: '',
              writer: '',
              content: '',
            },
          };
        },
        methods: {
          submitForm() {
            this.submitted = true;

            if (
              this.postData.title === '' ||
              this.postData.writer === '' ||
              this.postData.content === ''
            ) {
              return;
            }

            this.posts.push({ ...this.postData });
            alert('작성 완료!');
            this.resetForm();
          },
          resetForm() {
            this.submitted = false;

            for (let k in this.postData) {
              this.postData[k] = '';
            }
          },
          onoffList() {
            this.showList = !this.showList;
          },
        },
      });
      app.mount('#sunghoon');
    </script>
  </body>
</html>
