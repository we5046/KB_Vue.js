<!doctype html>
<html lang="ko">
  <head>
    <title>bootstrap 5</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      h2 {
        margin-top: 50px;
        font-weight: bolder;
      }

      #mg {
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2><i class="fa-solid fa-right-to-bracket"></i> 로그인</h2>

      <div>
        <label for="userid"><i class="fa-solid fa-user"></i> 사용자 ID:</label>
        <input id="userid" name="userid" type="text" class="form-control" />
      </div>
      <div id="mg">
        <label for="password"><i class="fa-solid fa-lock"></i> 비밀번호:</label>
        <input
          id="password"
          name="password"
          type="password"
          class="form-control"
        />
      </div>
      <button
        type="button"
        class="text-center text-white btn btn-primary w-100"
      >
        <i class="fa-solid fa-right-to-bracket"></i> 로그인
      </button>
    </div>
  </body>
</html>
