<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>bootstrap 5</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style></style>
  </head>
  <body>
    <div id="sunghoon" class="container mt-3">
      <div class="card shadow mt-3">
        <div class="card-body">
          <form @submit.prevent="loginClicked">
            <h2 class="fw-bold"><i class="fa-solid fa-right-to-bracket"></i> 로그인</h2>
            <div class="mt-5">
              <label for="userid"><i class="fa-solid fa-user mb-3"></i> 사용자 ID:</label>
              <input v-model.trim="loginData.userid" id="userid" type="text" class="form-control" />
              <div v-if="submitted && loginData.userid === ''" class="text-danger">
                ID를 입력하세요
              </div>
            </div>
            <div class="mt-3">
              <label for="userpw"><i class="fa-solid fa-lock mb-3"></i> 비밀번호:</label>
              <input v-model="loginData.userpw" id="userpw" type="password" class="form-control" />
              <div v-if="submitted && loginData.userpw === ''" class="text-danger">
                Password를 입력하세요
              </div>
            </div>
            <div class="d-flex mt-3">
              <button type="submit" class="btn btn-primary w-100">
                <i class="fa-solid fa-right-to-bracket"></i> 로그인
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let app = Vue.createApp({
        name: 'app',
        data() {
          return {
            submitted: false,
            loginSuccess: [
              {
                userid: 'sunghoon',
                userpw: 'KBITYL',
              },
            ],
            loginData: {
              userid: '',
              userpw: '',
            },
          };
        },
        methods: {
          loginClicked() {
            if (this.loginData.userid === '' || this.loginData.userpw === '') {
              this.submitted = true;
              return;
            }

            let isValid = this.loginSuccess.find((user) => {
              return user.userid === this.loginData.userid && user.userpw === this.loginData.userpw;
            });
            if (isValid) {
              alert('로그인 성공');
            } else {
              alert('로그인 실패');
            }
          },
        },
      });
      app.mount('#sunghoon');
    </script>
  </body>
</html>
