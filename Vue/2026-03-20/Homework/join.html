<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>bootstrap 5</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow p-4 mx-auto" style="max-width: 600px">
        <h1 class="mb-4 fw-bold"><i class="fa-solid fa-user-plus"></i> 회원 가입</h1>
        <br />
        <div class="mb-3">
          <label for="userid"><i class="fa-solid fa-user"></i> 사용자 ID:</label>
          <input id="userid" type="text" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="password"><i class="fa-solid fa-lock"></i> 비밀번호:</label>
          <input id="password" type="password" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="check"><i class="fa-solid fa-lock"></i> 비밀번호 확인:</label>
          <input id="check" type="password" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="email"><i class="fa-regular fa-envelope"></i> email:</label>
          <input id="email" type="email" class="form-control" />
        </div>
        <div class="mb-4">
          <label for="userimage"><i class="fa-solid fa-user-astronaut"></i> 아바타 이미지</label>
          <input id="userimage" type="file" class="form-control" />
        </div>
        <div class="d-flex justify-content-center">
          <button type="button" class="btn btn-primary">
            <i class="fa-solid fa-user-plus"></i> 회원가입
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
