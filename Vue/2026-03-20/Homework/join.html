<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>bootstrap 5</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <div id="sunghoon" class="container py-5">
      <div class="card shadow p-4 mx-auto" style="max-width: 600px">
        <h1 class="mb-4 fw-bold"><i class="fa-solid fa-user-plus"></i> 회원 가입</h1>
        <br />
        <div class="mb-3">
          <label for="userid"><i class="fa-solid fa-user"></i> 사용자 ID:</label>
          <input v-model.trim="userData.userID" id="userid" type="text" class="form-control" />
          <div v-if="submitted && errors.userID" class="text-danger">{{ errors.userID }}</div>
        </div>
        <div class="mb-3">
          <label for="password"><i class="fa-solid fa-lock"></i> 비밀번호:</label>
          <input v-model="userData.userPW" id="password" type="password" class="form-control" />
          <div v-if="submitted && errors.userPW" class="text-danger">{{ errors.userPW }}</div>
        </div>
        <div class="mb-3">
          <label for="check"><i class="fa-solid fa-lock"></i> 비밀번호 확인:</label>
          <input v-model="confirmPW" id="check" type="password" class="form-control" />
          <div v-if="submitted && errors.confirmPW" class="text-danger">{{ errors.confirmPW }}</div>
        </div>
        <div class="mb-3">
          <label for="email"><i class="fa-regular fa-envelope"></i> email:</label>
          <input v-model.trim="userData.email" id="email" type="email" class="form-control" />
          <div v-if="submitted && errors.email" class="text-danger">{{ errors.email }}</div>
        </div>
        <div class="mb-4">
          <label for="userimage"><i class="fa-solid fa-user-astronaut"></i> 아바타 이미지</label>
          <input @change="handleFile" id="userimage" type="file" class="form-control" />
        </div>
        <div class="d-flex justify-content-center">
          <button type="button" class="btn btn-primary" @click="register">
            <i class="fa-solid fa-user-plus"></i> 회원가입
          </button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let app = Vue.createApp({
        name: 'App',
        data() {
          return {
            submitted: false,
            users: [
              {
                userID: 'sunghoon',
                userPW: 'KBITYL',
                email: 'we5046@naver.com',
                imgLink: '',
              },
            ],
            userData: {
              userID: '',
              userPW: '',
              email: '',
              imgLink: '',
            },
            confirmPW: '',
            errors: {
              userID: '',
              userPW: '',
              confirmPW: '',
              email: '',
            },
          };
        },
        methods: {
          register() {
            this.submitted = true;

            // 기존 에러 초기화
            this.errors.userID = '';
            this.errors.userPW = '';
            this.errors.confirmPW = '';
            this.errors.email = '';

            let isValid = true;

            // 아이디 미입력 || 중복 체크
            if (this.userData.userID === '') {
              this.errors.userID = 'ID를 입력하세요';
              isValid = false;
            } else {
              const AlreadyID = this.users.some((user) => {
                return user.userID === this.userData.userID;
              });

              if (AlreadyID) {
                this.errors.userID = '이미 사용중인 ID입니다.';
                isValid = false;
              }
            }

            // 비밀번호 미입력
            if (this.userData.userPW === '') {
              this.errors.userPW = 'Password를 입력하세요';
              isValid = false;
            }

            // userPW === confirmPW 체크
            if (this.userData.userPW !== this.confirmPW) {
              this.errors.confirmPW = 'Password가 일치하지 않습니다.';
              isValid = false;
            }

            // email 미입력 || 중복 체크
            if (this.userData.email === '') {
              this.errors.email = 'email을 입력하세요';
              isValid = false;
            } else {
              const AlreadyMail = this.users.some((user) => {
                return user.email === this.userData.email;
              });

              if (AlreadyMail) {
                this.errors.email = '이미 사용 중인 email입니다';
                isValid = false;
              }
            }
            if (!isValid) {
              return;
            }

            // App Instance에 들어있는 users 배열에 입력값 저장하기
            this.users.push({
              userID: this.userData.userID,
              userPW: this.userData.userPW,
              email: this.userData.email,
              imgLink: this.userData.imgLink,
            });

            alert('회원가입 완료!');

            this.inputReset();
          },

          inputReset() {
            for (let k in this.userData) {
              this.userData[k] = '';
            }
            this.confirmPW = '';
            this.submitted = false;
          },

          handleFile(event) {
            const file = event.target.files[0];
            if (file) {
              this.userData.imgLink = file.name;
            }
          },
        },
      });
      app.mount('#sunghoon');
    </script>
  </body>
</html>
